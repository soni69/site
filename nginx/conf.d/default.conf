# Upstream к Next.js + Payload приложению
upstream nextjs_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name stop-lyst.ru www.stop-lyst.ru;

    # Редирект www → без www
    if ($host = www.stop-lyst.ru) {
        return 301 http://stop-lyst.ru$request_uri;
    }

    # Лимит размера загружаемого файла (Payload media)
    client_max_body_size 25m;

    # ─── Безопасные заголовки ──────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Кэш статики Next.js: immutable на год ────────────────────────────
    location /_next/static/ {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;

        proxy_cache_valid  200 1y;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    # ─── Кэш оптимизированных картинок Next.js ────────────────────────────
    location /_next/image {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;

        proxy_cache_valid  200 30d;
        add_header         Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
    }

    # ─── Публичные файлы из /public (favicons, robots, sitemap) ──────────
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|avif|woff2?|ttf|otf|eot)$ {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;

        add_header         Cache-Control "public, max-age=86400, stale-while-revalidate=604800";
        access_log         off;
    }

    # ─── Все остальные запросы → Next.js ──────────────────────────────────
    location / {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;

        # Буферизация ответа
        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         8 16k;
    }
}
